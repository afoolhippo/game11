<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>タポタポオレンジ</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- タイトル -->
<div id="titleScreen" class="screen">

  <img src="title.png" id="titleLogo" alt="タポタポオレンジ">

  <div id="ruleText">
    オレンジ何杯いける！？<br>
    限界ギリギリまで攻めろ！<br>
    無理ならギブアップ！
  </div>

  <button id="startBtn">タップしてスタート</button>

</div>

<!-- ゲーム -->
<div id="gameScreen" class="screen hidden">

  <button id="backBtn">タイトルへ戻る</button>

  <div id="face">(^_^)</div>

  <div id="scoreArea">
    現在 <span id="score">0</span> 杯
  </div>

  <div id="conveyorArea">

    <div id="conveyorLine"></div>

    <div id="drinkZone"></div>

    <div id="ticks"></div>

    <img src="orange.png" id="orange">

  </div>

  <div id="buttons">

    <button id="drinkBtn" disabled>飲む！</button>

    <button id="giveupBtn">ギブアップ</button>

  </div>

</div>

<!-- リザルト -->
<div id="resultScreen" class="screen hidden">

  <div id="resultFace">(T_T)</div>

  <div id="resultText"></div>

  <div id="resultScore"></div>

  <button id="shareBtn">Xでシェア</button>

  <button id="retryBtn">もう1回遊ぶ</button>

  <button id="homeBtn">カバゲーセンへ</button>

</div>

<!-- 音 -->
<audio id="bgm" src="bgm.mp3" loop></audio>

<audio id="startSe" src="start.mp3"></audio>

<audio id="gokuSe" src="goku.mp3"></audio>

<audio id="nomidokiSe" src="nomidoki.mp3"></audio>

<audio id="outSe" src="out.mp3"></audio>

<script src="game.js"></script>

</body>
</html>
